name: Content Checks

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'docusaurus.config.ts'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
      - 'src/**'
      - 'public/**'
      - 'package-lock.json'
      - 'package.json'
      - '.markdownlint.yaml'
      - '.typos.toml'
      - '.github/workflows/content-checks.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.md'
      - '**/*.mdx'
      - 'docs/**'
      - 'docusaurus.config.ts'
      - 'eslint.config.mjs'
      - 'tsconfig.json'
      - 'src/**'
      - 'public/**'
      - 'package-lock.json'
      - 'package.json'
      - '.markdownlint.yaml'
      - '.typos.toml'
      - '.github/workflows/content-checks.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: content-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Markdown lint
        uses: nosborn/github-action-markdown-cli@v3.2.0
        with:
          files: './**/*.{md,mdx}'
          config_file: .markdownlint.yaml

  typos:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check typos
        uses: crate-ci/typos@v1
        with:
          config: .typos.toml
